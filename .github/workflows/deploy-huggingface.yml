name: Deploy API to Hugging Face
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/api/**'
      - '.github/workflows/deploy-huggingface.yml'

jobs:
  deploy:
    if: ${{ vars.HF_SPACE_REPO != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push API to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ vars.HF_SPACE_REPO }}
        run: |
          test -n "$HF_TOKEN" || (echo "HF_TOKEN secret is missing" && exit 1)
          git clone "https://oauth2:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO}" hf-space
          rsync -a --delete --exclude .git services/api/ hf-space/
          cd hf-space
          git config user.name "Odium Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy API from ${GITHUB_SHA}"
          git push
