name: Windows Release
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Release version without v prefix
        required: true
        default: 0.1.0

permissions:
  contents: write
  issues: write

jobs:
  release:
    runs-on: windows-latest
    env:
      VITE_API_URL: ${{ vars.VITE_API_URL || 'http://localhost:7860' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Resolve release tag
        id: meta
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') { $tag = '${{ github.ref_name }}' }
          elseif ('${{ github.event_name }}' -eq 'workflow_dispatch') { $tag = 'v${{ inputs.version }}' }
          else { $tag = 'v0.1.0' }
          "tag=$tag" >> $env:GITHUB_OUTPUT
      - name: Check existing release
        id: existing
        shell: pwsh
        run: |
          gh release view '${{ steps.meta.outputs.tag }}' *> $null
          if ($LASTEXITCODE -eq 0) { "exists=true" >> $env:GITHUB_OUTPUT } else { "exists=false" >> $env:GITHUB_OUTPUT }
      - name: Install dependencies
        if: steps.existing.outputs.exists != 'true'
        run: npm install --no-audit --no-fund
      - name: Build Windows installer
        if: steps.existing.outputs.exists != 'true'
        run: npm run dist:win
      - name: Publish GitHub Release
        if: steps.existing.outputs.exists != 'true'
        shell: pwsh
        run: |
          $assets = Get-ChildItem 'apps/desktop/release' -File | ForEach-Object { $_.FullName }
          if ($assets.Count -eq 0) { throw 'No Windows release assets were generated.' }
          gh release create '${{ steps.meta.outputs.tag }}' $assets `
            --target '${{ github.sha }}' `
            --title 'Odium Studio Wrapper ${{ steps.meta.outputs.tag }}' `
            --notes 'İlk Windows masaüstü sürümü. Rol bazlı prodüksiyon paneli, seslendirme ve miksaj retake akışları, Hugging Face uyumlu API ve uygulama içi otomatik güncelleme altyapısı içerir.'
      - name: Record successful release
        if: ${{ steps.existing.outputs.exists == 'true' || success() }}
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          New-Item -ItemType Directory -Force -Path 'release-status' | Out-Null
          @{
            tag = $tag
            release_url = "https://github.com/${{ github.repository }}/releases/tag/$tag"
            commit = '${{ github.sha }}'
            verified_at = (Get-Date).ToUniversalTime().ToString('o')
          } | ConvertTo-Json | Set-Content -Encoding utf8 "release-status/$tag.json"
          git config user.name 'Odium Release Bot'
          git config user.email 'actions@users.noreply.github.com'
          git add release-status
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Record $tag release"
            git push
          }
      - name: Report successful release
        if: ${{ steps.existing.outputs.exists == 'true' || success() }}
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          $existing = gh issue list --state open --search "[release] $tag published in:title" --json number --jq '.[0].number'
          if (-not $existing) {
            gh issue create --title "[release] $tag published" --body "Windows installer and updater assets were published successfully. Release: https://github.com/${{ github.repository }}/releases/tag/$tag"
          }
      - name: Report failed release
        if: failure()
        shell: pwsh
        run: |
          $tag = '${{ steps.meta.outputs.tag }}'
          gh issue create --title "[release] $tag failed" --body "The Windows release workflow failed. Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
